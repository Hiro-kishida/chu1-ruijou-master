<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>中1数学｜累乗マスター</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --ink: #132338;
      --sub: #65748a;
      --navy: #213b66;
      --navy-2: #304f80;
      --accent: #1ea98c;
      --accent-soft: #e3f7f1;
      --warn: #e4783f;
      --warn-soft: #fff0e7;
      --correct: #08785f;
      --line: #dbe3ef;
      --shadow: 0 18px 50px rgba(29, 48, 78, .10);
      --radius: 24px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 8%, #e5efff 0, transparent 34%),
        radial-gradient(circle at 90% 12%, #daf6ee 0, transparent 28%),
        var(--bg);
      color: var(--ink);
      font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", system-ui, sans-serif;
      display: flex;
      justify-content: center;
      padding: clamp(12px, 2.5vw, 28px);
    }

    button { font: inherit; cursor: pointer; border: 0; }

    /* 指数は式の一部として横並びに保ち、基数の右上へ表示 */
    sup {
      display: inline-block;
      font-size: .56em;
      line-height: 1;
      position: relative;
      top: -.6em;
      font-weight: 800;
      vertical-align: baseline;
      margin-left: .03em;
    }

    .app {
      width: min(100%, 920px);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .topbar {
      min-height: 62px;
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(219,227,239,.8);
      border-radius: 22px;
      padding: 11px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-mark {
      width: 42px; height: 42px; border-radius: 14px;
      background: var(--navy); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 21px; font-weight: 800;
    }
    .brand-mark sup { top: -.42em; font-size: .52em; }
    .brand h1 { margin: 0; font-size: clamp(17px, 2.5vw, 21px); letter-spacing: .03em; }
    .brand p { margin: 2px 0 0; color: var(--sub); font-size: 12px; }
    .home-btn {
      color: var(--navy); background: #edf2fa; border-radius: 14px;
      padding: 10px 13px; font-weight: 700; display: none;
    }
    .home-btn.show { display: inline-flex; }

    .welcome {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(21px, 4vw, 34px);
      display: block;
    }
    .welcome.hidden { display: none; }
    .welcome h2 { margin: 0 0 8px; font-size: clamp(24px, 4vw, 33px); }
    .welcome h2 sup { color: var(--accent); }
    .welcome-intro { margin: 0 0 22px; line-height: 1.75; color: var(--sub); font-weight: 500; }
    .modes {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    }
    .mode-card {
      text-align: left; background: #f7f9fd; border: 2px solid transparent;
      padding: 17px 15px; border-radius: 19px; transition: .18s transform, .18s border, .18s background;
      min-height: 155px;
    }
    .mode-card:hover, .mode-card:focus-visible { transform: translateY(-2px); border-color: #c8d8f0; background: white; }
    .level {
      display: inline-block; padding: 4px 9px; border-radius: 20px; background: #e7eef9;
      color: var(--navy); font-size: 12px; font-weight: 800; margin-bottom: 10px;
    }
    .mode-card strong { display: block; font-size: 17px; margin-bottom: 9px; }
    .mode-example { font-size: 25px; color: var(--navy); font-weight: 750; margin-bottom: 8px; }
    .mode-card small { color: var(--sub); line-height: 1.45; display: block; }
    .teacher-note {
      margin-top: 20px; padding: 13px 15px; border-radius: 15px; background: var(--accent-soft);
      color: #245b51; font-size: 13px; line-height: 1.65;
    }

    .practice { display: none; gap: 14px; }
    .practice.active { display: grid; grid-template-columns: minmax(330px, 1fr) 330px; }

    .question-card {
      background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
      padding: clamp(18px, 3vw, 30px); min-height: 550px;
      display: flex; flex-direction: column;
    }
    .status-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
    .mode-pill {
      background: #eef3fb; border-radius: 100px; padding: 8px 12px;
      color: var(--navy); font-size: 13px; font-weight: 750;
    }
    .stats { display: flex; gap: 7px; }
    .stat {
      background: #f4f7fb; padding: 7px 10px; border-radius: 11px;
      color: var(--sub); font-size: 12px; font-weight: 700;
    }
    .stat b { color: var(--ink); font-size: 15px; margin-left: 3px; }

    .prompt { text-align: center; color: var(--sub); font-size: 14px; font-weight: 700; margin-top: 33px; }
    .formula {
      min-height: 83px;
      display: flex;
      align-items: baseline;
      justify-content: center;
      white-space: nowrap;
      margin: 12px 0 18px;
      font-size: clamp(44px, 8vw, 67px);
      color: var(--ink);
      font-weight: 780;
      letter-spacing: .02em;
    }
    .formula sup {
      top: -.7em;
      font-size: .54em;
      margin-left: .06em;
      margin-right: .05em;
    }
    .answer-box {
      min-height: 69px; border-radius: 18px; border: 2px solid var(--line);
      background: #fbfcff; margin-inline: auto; width: min(330px, 100%);
      display: flex; align-items: center; justify-content: center; gap: 9px;
      font-size: 33px; font-weight: 750; color: var(--navy);
    }
    .answer-box .label { font-size: 13px; color: var(--sub); align-self: flex-start; margin-top: 11px; }
    .answer-box.empty .typed::after { content: "?"; color: #b4c0d2; }
    .answer-box.correct { border-color: #87d5c1; background: #effaf6; color: var(--correct); }
    .answer-box.wrong { border-color: #fac3a6; background: #fff7f2; color: var(--warn); }

    .feedback {
      opacity: 0; transform: translateY(4px); pointer-events: none;
      transition: .18s; margin-top: 17px; border-radius: 16px; padding: 0 16px;
      max-height: 0; overflow: hidden;
    }
    .feedback.show { opacity: 1; transform: none; pointer-events: auto; max-height: 310px; padding: 14px 16px; }
    .feedback.good { background: var(--accent-soft); color: #1d5e51; }
    .feedback.miss { background: var(--warn-soft); color: #7b4127; }
    .feedback-title { font-weight: 850; font-size: 17px; margin-bottom: 10px; }
    .working { font-size: clamp(20px, 3.5vw, 27px); font-weight: 730; line-height: 1.75; }
    .tip { font-size: 13px; line-height: 1.55; font-weight: 650; margin-top: 7px; }
    .comparison-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px;
    }
    .comparison-side {
      border-radius: 12px; padding: 9px 7px; font-size: clamp(16px, 2.5vw, 21px);
      line-height: 1.7; background: rgba(255,255,255,.6); text-align: center;
    }
    .comparison-side.focus { outline: 2px solid rgba(30,169,140,.42); }
    .next-area { margin-top: auto; padding-top: 15px; display: flex; gap: 8px; justify-content: center; }
    .action {
      border-radius: 14px; padding: 13px 16px; font-weight: 800; display: none;
      font-size: 15px;
    }
    .action.show { display: inline-flex; }
    .next-btn { background: var(--accent); color: white; }
    .retry-btn { background: #edf2fa; color: var(--navy); }

    .calculator {
      background: var(--navy); border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 17px; display: flex; flex-direction: column; gap: 12px;
    }
    .calc-header { color: rgba(255,255,255,.77); font-size: 13px; font-weight: 700; padding: 3px 3px 7px; }
    .keys { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; }
    .key {
      min-height: 70px; border-radius: 17px; background: rgba(255,255,255,.10);
      color: #fff; font-size: 29px; font-weight: 650;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.13);
      transition: transform .06s, background .12s;
    }
    .key:active { transform: scale(.97); background: rgba(255,255,255,.17); }
    .key.tool { font-size: 19px; background: rgba(255,255,255,.16); font-weight: 700; }
    .key.negative { font-size: 22px; }
    .submit {
      width: 100%; min-height: 68px; background: var(--accent); color: white;
      border-radius: 17px; font-weight: 850; font-size: 20px; letter-spacing: .05em;
      transition: transform .06s, filter .12s;
    }
    .submit:active { transform: scale(.98); filter: brightness(.94); }
    .submit:disabled, .key:disabled { opacity: .45; cursor: default; }
    .keyboard-help { color: rgba(255,255,255,.6); text-align: center; font-size: 11px; margin-top: 1px; }

    .celebration {
      position: fixed; inset: 0; z-index: 10; pointer-events: none;
      display: none; place-items: center; background: rgba(16,30,51,.18);
    }
    .celebration.show { display: grid; }
    .congrats {
      z-index: 2; background: white; border-radius: 25px; padding: 26px 34px;
      box-shadow: 0 22px 64px rgba(13,27,47,.25); text-align: center;
      animation: pop .35s cubic-bezier(.2,.9,.2,1.25);
    }
    .congrats .emoji { font-size: 44px; }
    .congrats h2 { margin: 6px 0 4px; font-size: 26px; color: var(--navy); }
    .congrats p { margin: 0; color: var(--sub); font-weight: 700; }
    .confetti { position: absolute; inset: 0; overflow: hidden; }
    .confetti i {
      position: absolute; top: -15px; display: block; width: 10px; height: 18px; border-radius: 3px;
      animation: fall 1.7s ease-out forwards;
    }
    @keyframes pop { from { transform: scale(.65); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes fall { to { transform: translateY(110vh) rotate(500deg); opacity: .1; } }

    @media (max-width: 760px) {
      body { padding: 9px; }
      .modes { grid-template-columns: 1fr; }
      .mode-card { min-height: unset; }
      .practice.active { display: flex; flex-direction: column; }
      .question-card { min-height: 470px; }
      .calculator { padding: 13px; }
      .key { min-height: 58px; }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="累乗マスター">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">x<sup>2</sup></div>
        <div>
          <h1>中1数学　累乗マスター</h1>
          <p>指数を見たら、掛け算に戻そう</p>
        </div>
      </div>
      <button class="home-btn" id="homeBtn" type="button">モード選択</button>
    </header>

    <section class="welcome" id="welcome">
      <h2>今日は、どの練習をする？</h2>
      <p class="welcome-intro">問題の答えを、電卓のように入力します。正解したら、指数を掛け算に戻した形も確認できます。</p>
      <div class="modes">
        <button class="mode-card" data-mode="positive" type="button">
          <span class="level">ステージ 1</span>
          <strong>正の数の累乗</strong>
          <div class="mode-example">3<sup>3</sup> = ?</div>
          <small>指数は「何回かけるか」を確認。</small>
        </button>
        <button class="mode-card" data-mode="negativeParen" type="button">
          <span class="level">ステージ 2</span>
          <strong>負の数・カッコあり</strong>
          <div class="mode-example">(−2)<sup>3</sup> = ?</div>
          <small>−も一緒にかけることを確認。</small>
        </button>
        <button class="mode-card" data-mode="comparison" type="button">
          <span class="level">ステージ 3</span>
          <strong>カッコあり／なし</strong>
          <div class="mode-example">−2<sup>2</sup> = ?</div>
          <small>よく似た式の違いを見分ける。</small>
        </button>
      </div>
      <div class="teacher-note">先生用メモ：問題は内部で「正の累乗」「負の数の偶数乗／奇数乗」「カッコなし」「比較」に分類しています。後から正誤記録機能につなげられます。</div>
    </section>

    <section class="practice" id="practice" aria-live="polite">
      <div class="question-card">
        <div class="status-row">
          <div class="mode-pill" id="modePill"></div>
          <div class="stats">
            <div class="stat">連続正解 <b id="streak">0</b></div>
            <div class="stat">正解 <b id="correctCount">0</b></div>
          </div>
        </div>
        <div class="prompt">答えを入力しよう</div>
        <div class="formula" id="formula"></div>
        <div class="answer-box empty" id="answerBox">
          <span class="label">答え</span><span class="typed" id="typed"></span>
        </div>
        <div class="feedback" id="feedback"></div>
        <div class="next-area">
          <button class="action retry-btn" id="retryBtn" type="button">同じ問題に再挑戦</button>
          <button class="action next-btn" id="nextBtn" type="button">次の問題へ</button>
        </div>
      </div>

      <aside class="calculator" aria-label="答え入力用電卓">
        <div class="calc-header">電卓ボタンで答えを入力</div>
        <div class="keys" id="keys">
          <button class="key" data-key="7" type="button">7</button>
          <button class="key" data-key="8" type="button">8</button>
          <button class="key" data-key="9" type="button">9</button>
          <button class="key" data-key="4" type="button">4</button>
          <button class="key" data-key="5" type="button">5</button>
          <button class="key" data-key="6" type="button">6</button>
          <button class="key" data-key="1" type="button">1</button>
          <button class="key" data-key="2" type="button">2</button>
          <button class="key" data-key="3" type="button">3</button>
          <button class="key tool negative" data-key="sign" type="button">±</button>
          <button class="key" data-key="0" type="button">0</button>
          <button class="key tool" data-key="back" type="button">⌫</button>
          <button class="key tool" data-key="clear" type="button">消す</button>
          <button class="key tool" data-key="sign" type="button">−</button>
          <button class="key tool" data-key="back" type="button">一字消す</button>
        </div>
        <button class="submit" id="submitBtn" type="button">決定</button>
        <div class="keyboard-help">キーボードの数字・−・Enterでも入力できます</div>
      </aside>
    </section>
  </main>

  <div class="celebration" id="celebration" aria-hidden="true">
    <div class="confetti" id="confetti"></div>
    <div class="congrats">
      <div class="emoji">🎉</div>
      <h2>10問連続正解！</h2>
      <p>累乗の見方が身についてきたね！</p>
    </div>
  </div>

<script>
(() => {
  'use strict';

  const MODES = {
    positive: { label: 'ステージ1｜正の数の累乗', generator: createPositiveProblem },
    negativeParen: { label: 'ステージ2｜負の数・カッコあり', generator: createNegativeParenProblem },
    comparison: { label: 'ステージ3｜カッコあり／なし', generator: createComparisonProblem }
  };

  const state = {
    mode: null,
    current: null,
    previousKey: '',
    input: '',
    locked: false,
    streak: 0,
    correct: 0,
    attempted: 0
  };

  const $ = (id) => document.getElementById(id);
  const welcome = $('welcome');
  const practice = $('practice');
  const homeBtn = $('homeBtn');
  const formula = $('formula');
  const typed = $('typed');
  const answerBox = $('answerBox');
  const feedback = $('feedback');
  const retryBtn = $('retryBtn');
  const nextBtn = $('nextBtn');
  const submitBtn = $('submitBtn');

  document.querySelectorAll('.mode-card').forEach(button => {
    button.addEventListener('click', () => startMode(button.dataset.mode));
  });
  homeBtn.addEventListener('click', goHome);
  $('keys').addEventListener('click', event => {
    const button = event.target.closest('[data-key]');
    if (button) useKey(button.dataset.key);
  });
  submitBtn.addEventListener('click', checkAnswer);
  retryBtn.addEventListener('click', retrySameProblem);
  nextBtn.addEventListener('click', nextProblem);

  window.addEventListener('keydown', event => {
    if (!state.mode || state.locked) return;
    if (/^[0-9]$/.test(event.key)) useKey(event.key);
    if (event.key === '-' || event.key === 'Subtract') useKey('sign');
    if (event.key === 'Backspace') useKey('back');
    if (event.key === 'Escape') useKey('clear');
    if (event.key === 'Enter') checkAnswer();
  });

  function startMode(mode) {
    state.mode = mode;
    state.streak = 0;
    state.correct = 0;
    state.attempted = 0;
    $('modePill').textContent = MODES[mode].label;
    welcome.classList.add('hidden');
    practice.classList.add('active');
    homeBtn.classList.add('show');
    updateStats();
    nextProblem();
  }

  function goHome() {
    state.mode = null;
    welcome.classList.remove('hidden');
    practice.classList.remove('active');
    homeBtn.classList.remove('show');
    closeCelebration();
  }

  function nextProblem() {
    let problem;
    let safety = 0;
    do {
      problem = MODES[state.mode].generator();
      safety++;
    } while (problem.key === state.previousKey && safety < 12);
    state.previousKey = problem.key;
    state.current = problem;
    state.input = '';
    state.locked = false;
    formula.innerHTML = problem.expression;
    resetAnswerArea();
    feedback.className = 'feedback';
    feedback.innerHTML = '';
    retryBtn.classList.remove('show');
    nextBtn.classList.remove('show');
    setCalculatorEnabled(true);
  }

  function retrySameProblem() {
    state.input = '';
    state.locked = false;
    resetAnswerArea();
    feedback.className = 'feedback';
    feedback.innerHTML = '';
    retryBtn.classList.remove('show');
    nextBtn.classList.remove('show');
    setCalculatorEnabled(true);
  }

  function resetAnswerArea() {
    typed.textContent = '';
    answerBox.className = 'answer-box empty';
  }

  function useKey(key) {
    if (state.locked || !state.mode) return;
    if (/^[0-9]$/.test(key)) {
      const unsigned = state.input.replace('-', '');
      if (unsigned.length >= 5) return;
      if (state.input === '0') state.input = key;
      else if (state.input === '-0') state.input = '-' + key;
      else state.input += key;
    } else if (key === 'sign') {
      if (state.input.startsWith('-')) state.input = state.input.slice(1);
      else state.input = '-' + state.input;
    } else if (key === 'back') {
      state.input = state.input.slice(0, -1);
    } else if (key === 'clear') {
      state.input = '';
    }
    renderInput();
  }

  function renderInput() {
    typed.textContent = state.input;
    answerBox.className = 'answer-box' + (state.input === '' || state.input === '-' ? ' empty' : '');
  }

  function checkAnswer() {
    if (state.locked || state.input === '' || state.input === '-') return;
    const submitted = Number(state.input);
    const correct = submitted === state.current.answer;
    state.locked = true;
    state.attempted++;
    setCalculatorEnabled(false);
    answerBox.className = 'answer-box ' + (correct ? 'correct' : 'wrong');

    if (correct) {
      state.streak++;
      state.correct++;
      feedback.className = 'feedback good show';
      feedback.innerHTML = '<div class="feedback-title">正解！ よくできました ◎</div>' + state.current.solution;
      nextBtn.classList.add('show');
      if (state.streak % 10 === 0) celebrate();
    } else {
      state.streak = 0;
      feedback.className = 'feedback miss show';
      feedback.innerHTML = '<div class="feedback-title">惜しい！ 掛け算に戻して確認しよう</div>' + state.current.solution;
      retryBtn.classList.add('show');
      nextBtn.classList.add('show');
    }
    updateStats();
  }

  function setCalculatorEnabled(enabled) {
    document.querySelectorAll('.calculator button').forEach(button => { button.disabled = !enabled; });
    retryBtn.disabled = false;
    nextBtn.disabled = false;
  }

  function updateStats() {
    $('streak').textContent = state.streak;
    $('correctCount').textContent = state.correct;
  }

  function powerHTML(baseHTML, exponent) {
    return baseHTML + '<sup>' + exponent + '</sup>';
  }

  function expansionHTML(term, exponent) {
    return Array.from({ length: exponent }, () => term).join(' × ');
  }

  function choose(array) {
    return array[Math.floor(Math.random() * array.length)];
  }

  function createPositiveProblem() {
    const pairs = [
      [2,2], [2,3], [2,4], [2,5], [3,2], [3,3], [3,4],
      [4,2], [4,3], [5,2], [5,3], [6,2], [7,2], [8,2], [9,2], [10,2]
    ];
    const [base, exponent] = choose(pairs);
    const answer = base ** exponent;
    const expression = powerHTML(String(base), exponent) + ' = ?';
    return {
      key: 'p-' + base + '-' + exponent,
      problem_type: 'positive_power',
      expression,
      answer,
      solution: '<div class="working">' + powerHTML(String(base), exponent) + ' = ' + expansionHTML(String(base), exponent) + ' = <strong>' + answer + '</strong></div>' +
        '<div class="tip">右上の小さい数は、同じ数をかける回数だね。</div>'
    };
  }

  function createNegativeParenProblem() {
    const pairs = [
      [1,2], [1,3], [1,4], [1,5], [2,2], [2,3], [2,4],
      [3,2], [3,3], [4,2], [4,3], [5,2], [5,3]
    ];
    const [base, exponent] = choose(pairs);
    const term = '(−' + base + ')';
    const answer = Math.pow(-base, exponent);
    const signType = exponent % 2 === 0 ? 'negative_parentheses_even' : 'negative_parentheses_odd';
    return {
      key: 'n-' + base + '-' + exponent,
      problem_type: signType,
      expression: powerHTML(term, exponent) + ' = ?',
      answer,
      solution: '<div class="working">' + powerHTML(term, exponent) + ' = ' + expansionHTML(term, exponent) + ' = <strong>' + formatNumber(answer) + '</strong></div>' +
        '<div class="tip">カッコの中の「−」も一緒に、' + exponent + '回かけています。</div>'
    };
  }

  function createComparisonProblem() {
    const base = choose([2, 3, 4, 5]);
    const exponent = choose([2, 3]);
    const withParen = Math.random() < .5;
    const parenthesized = powerHTML('(−' + base + ')', exponent);
    const noParen = '−' + powerHTML(String(base), exponent);
    const parenAnswer = Math.pow(-base, exponent);
    const noParenAnswer = -(base ** exponent);
    const targetExpression = withParen ? parenthesized : noParen;
    const answer = withParen ? parenAnswer : noParenAnswer;
    const targetClassLeft = withParen ? ' focus' : '';
    const targetClassRight = withParen ? '' : ' focus';
    const comparison =
      '<div class="comparison-grid">' +
        '<div class="comparison-side' + targetClassLeft + '">' + parenthesized + '<br>= ' + expansionHTML('(−' + base + ')', exponent) + '<br>= <strong>' + formatNumber(parenAnswer) + '</strong></div>' +
        '<div class="comparison-side' + targetClassRight + '">' + noParen + '<br>= −(' + expansionHTML(String(base), exponent) + ')<br>= <strong>' + formatNumber(noParenAnswer) + '</strong></div>' +
      '</div>';
    return {
      key: 'c-' + base + '-' + exponent + '-' + withParen,
      problem_type: withParen ? 'comparison_parentheses' : 'no_parentheses_negative',
      expression: targetExpression + ' = ?',
      answer,
      solution: comparison + '<div class="tip">カッコあり：−も一緒にかける。　カッコなし：数字を累乗してから、前の−をつける。</div>'
    };
  }

  function formatNumber(number) {
    return number < 0 ? '−' + Math.abs(number) : String(number);
  }

  function celebrate() {
    const overlay = $('celebration');
    const confetti = $('confetti');
    const colors = ['#1ea98c', '#ffca46', '#f07d50', '#5378bf', '#ef70a4'];
    confetti.innerHTML = '';
    for (let i = 0; i < 32; i++) {
      const piece = document.createElement('i');
      piece.style.left = Math.random() * 100 + '%';
      piece.style.background = choose(colors);
      piece.style.animationDelay = (Math.random() * .45) + 's';
      piece.style.transform = 'rotate(' + Math.random() * 180 + 'deg)';
      confetti.appendChild(piece);
    }
    overlay.classList.add('show');
    overlay.setAttribute('aria-hidden', 'false');
    window.setTimeout(closeCelebration, 1900);
  }

  function closeCelebration() {
    $('celebration').classList.remove('show');
    $('celebration').setAttribute('aria-hidden', 'true');
  }
})();
</script>
